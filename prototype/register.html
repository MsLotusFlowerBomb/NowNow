<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – NowNow Prototype</title>
    <link rel="stylesheet" href="css/prototype.css">
    <style>
        .auth-page{background:linear-gradient(135deg,#fff5f0 0%,#f0f4ff 100%)}
        .auth-container{display:flex;justify-content:center;align-items:center;padding:3rem 1rem;flex:1}
        .auth-card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow);padding:2.5rem;width:100%;max-width:640px}
        .auth-header{text-align:center;margin-bottom:2rem}
        .auth-header h1{font-size:1.8rem;font-weight:800}
        .auth-header p{color:var(--muted);margin-top:.4rem}
        .auth-footer-text{text-align:center;margin-top:1.2rem;font-size:.9rem;color:var(--muted)}
        .role-selector{display:flex;gap:1rem}
        .role-option{cursor:pointer;flex:1}
        .role-option input[type="radio"]{display:none}
        .role-card{display:flex;flex-direction:column;align-items:center;padding:1.2rem;border:2px solid var(--border);border-radius:var(--radius);text-align:center;transition:border-color .25s,background .25s}
        .role-option input:checked + .role-card{border-color:var(--primary);background:rgba(255,107,53,.05)}
        .role-icon{font-size:2rem;margin-bottom:.3rem}
        .role-name{font-weight:700;font-size:1rem}
        .role-desc{font-size:.8rem;color:var(--muted)}
        .form-section-title{font-size:1rem;font-weight:700;color:var(--muted);margin:1.5rem 0 .8rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
    </style>
</head>
<body class="auth-page">
<div class="prototype-banner">⚡ Interactive Prototype – No server required</div>

<nav class="navbar">
    <a href="index.html" class="nav-brand">🚀 NowNow</a>
    <div class="nav-links">
        <a href="track.html">Track Package</a>
        <a href="login.html">Login</a>
    </div>
</nav>

<main class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🚀 Create Account</h1>
            <p>Join NowNow to start sending and tracking packages</p>
        </div>

        <form id="registerForm" novalidate>
            <div class="form-row">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" placeholder="Jane Doe">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" placeholder="+1 555-0100">
                </div>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" placeholder="you@example.com">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="password">Password * (min 8 chars)</label>
                    <input type="password" id="password" placeholder="••••••••">
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password *</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••">
                </div>
            </div>

            <div class="form-group">
                <label>Account Type *</label>
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="role" value="CUSTOMER" checked>
                        <span class="role-card">
                            <span class="role-icon">📦</span>
                            <span class="role-name">Customer</span>
                            <span class="role-desc">Send &amp; track packages</span>
                        </span>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="role" value="DRIVER" id="driverRadio">
                        <span class="role-card">
                            <span class="role-icon">🏍️</span>
                            <span class="role-name">Driver</span>
                            <span class="role-desc">Deliver packages &amp; earn</span>
                        </span>
                    </label>
                </div>
            </div>

            <!-- Driver-only fields -->
            <div id="driverFields" style="display:none">
                <h3 class="form-section-title">Driver Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="vehicleType">Vehicle Type</label>
                        <select id="vehicleType">
                            <option value="BICYCLE">Bicycle</option>
                            <option value="MOTORBIKE" selected>Motorbike</option>
                            <option value="CAR">Car</option>
                            <option value="VAN">Van</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="licenseNumber">License Number</label>
                        <input type="text" id="licenseNumber" placeholder="DL-XXXXX">
                    </div>
                </div>
            </div>

            <div id="registerError" class="alert alert-error" style="display:none"></div>

            <button type="submit" class="btn btn-primary btn-full" style="margin-top:.5rem">
                Create Account
            </button>
        </form>

        <p class="auth-footer-text">Already have an account? <a href="login.html">Sign in</a></p>
    </div>
</main>

<footer class="footer">
    <p>🚀 NowNow Courier – Interactive Prototype</p>
</footer>
<script src="js/prototype.js"></script>
<script>
    initPage('register');

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        var name    = document.getElementById('fullName').value.trim();
        var email   = document.getElementById('email').value.trim();
        var pwd     = document.getElementById('password').value;
        var cpwd    = document.getElementById('confirmPassword').value;
        var errDiv  = document.getElementById('registerError');
        errDiv.style.display = 'none';

        if (!name || !email || !pwd) {
            errDiv.textContent = 'Full name, email, and password are required.';
            errDiv.style.display = 'block';
            return;
        }
        if (pwd.length < 8) {
            errDiv.textContent = 'Password must be at least 8 characters.';
            errDiv.style.display = 'block';
            return;
        }
        if (pwd !== cpwd) {
            errDiv.textContent = 'Passwords do not match.';
            errDiv.style.display = 'block';
            return;
        }
        // Redirect to appropriate dashboard for demo
        var role = document.querySelector('input[name="role"]:checked').value;
        window.location.href = role === 'DRIVER' ? 'driver-dashboard.html' : 'customer-dashboard.html';
    });
</script>
</body>
</html>
